<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUNDI Email Template</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #f4f7fb 0%, #eaf2ff 100%);
        font-family: Arial, Helvetica, sans-serif;
        color: #14213d;
      }

      .wrapper {
        padding: 32px 16px;
      }

      .card {
        max-width: 680px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(20, 33, 61, 0.12);
        border: 1px solid #e4ebf6;
      }

      .header {
        background: linear-gradient(90deg, #0f172a 0%, #1d4ed8 100%);
        padding: 24px 32px;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-mark {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1d4ed8;
        font-weight: 800;
        font-size: 22px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      }

      .brand h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0.5px;
      }

      .brand p {
        margin: 2px 0 0;
        color: #dbeafe;
        font-size: 13px;
      }

      .pill {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .content {
        padding: 32px;
      }

      .content h2 {
        margin: 0 0 12px;
        font-size: 28px;
        color: #111827;
      }

      .content p {
        margin: 0 0 16px;
        font-size: 16px;
        line-height: 1.7;
        color: #475569;
      }

      .message-box {
        background: #f8fbff;
        border-left: 4px solid #2563eb;
        border-radius: 10px;
        padding: 16px 18px;
        margin: 22px 0;
        color: #1e3a8a;
        font-size: 15px;
      }

      .cta-row {
        margin-top: 24px;
      }

      .button {
        display: inline-block;
        padding: 12px 20px;
        background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%);
        color: #ffffff;
        text-decoration: none;
        border-radius: 999px;
        font-weight: 700;
      }

      .footer {
        padding: 20px 32px 28px;
        border-top: 1px solid #e5e7eb;
        font-size: 13px;
        color: #64748b;
      }

      .footer a {
        color: #2563eb;
        text-decoration: none;
      }

      .footer .support {
        margin-top: 8px;
      }

      @media screen and (max-width: 560px) {
        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .content {
          padding: 24px;
        }

        .footer {
          padding: 16px 24px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="header">
          <div class="brand">
            <div class="logo-mark">F</div>
            <div>
              <h1>FUNDI</h1>
              <p>Fast, trusted service at your doorstep</p>
            </div>
          </div>
          <div class="pill">Account Update</div>
        </div>

        <div class="content">
          <h2>{{ subject }}</h2>
          <p>Hello there,</p>
          <div class="message-box">
            <strong>Message:</strong><br />
            {{ message }}
          </div>
          <p>We’re here to keep your experience smooth, secure, and stress-free.</p>

          <div class="cta-row">
            <a href="https://myfundi.com" class="button">Open FUNDI</a>
          </div>
        </div>

        <div class="footer">
          <div>Need help? Contact us at <a href="mailto:myfundihub@gmail.com">myfundihub@gmail.com</a></div>
          <div class="support">© 2026 FUNDI. All rights reserved.</div>
        </div>
      </div>
    </div>
  </body>
</html>
